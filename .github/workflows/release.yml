name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create release archive
        run: |
          mkdir -p release
          # 根据package.json的files字段打包运行时需要的文件
          zip -r release/openclaw-yzj.zip index.ts src/ package.json openclaw.plugin.json clawdbot.plugin.json -x "*.DS_Store"

      - name: Generate changelog
        id: changelog
        run: |
          # 获取 tag 之间的 commit 历史
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi
          # 保存到文件供后续使用
          echo "$CHANGELOG" > changelog.txt
          # 如果没有 commit，使用默认消息
          if [ -z "$CHANGELOG" ]; then
            echo "Release ${{ github.ref_name }}" > changelog.txt
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.txt
          files: release/openclaw-yzj.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}